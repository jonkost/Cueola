<!doctype html>
<html data-product-theme="cool"><head><meta charset="utf-8">
<title>Cueola — Symbols</title>
<link rel="stylesheet" href="../../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--ui-background);color:var(--ui-label);font-family:var(--ui-font)}
  h2{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ui-label-secondary);margin:0 0 12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 4px 9px;
    background:var(--ui-content);border:1px solid var(--ui-separator);border-radius:10px}
  .cell .symbol{width:22px;height:22px}
  .cell code{font-size:9px;font-family:var(--ui-mono);color:var(--ui-label-secondary);text-align:center;word-break:break-all}
</style></head><body>

<h2>Semantic SF Symbols — <code>&lt;span class="symbol icon-…"&gt;</code>, colored by currentColor</h2>
<div class="grid">

</div>
