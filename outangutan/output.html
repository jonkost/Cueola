<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Outangutan Output</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  #v { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }
  /* identify pattern: SMPTE-ish bars + label, shown pre-show */
  #identify { position: absolute; inset: 0; display: none; flex-direction: column; }
  #identify.on { display: flex; }
  #bars { flex: 1; display: flex; }
  #bars > div { flex: 1; }
  #idlabel { position: absolute; inset: 0; display: grid; place-items: center; font: 800 8vw -apple-system, system-ui, sans-serif; color: #fff; text-shadow: 0 2px 18px rgba(0,0,0,.8); letter-spacing: .04em; }
  #waiting { position: absolute; inset: 0; display: grid; place-items: center; color: #2a2a2a; font: 700 3vw -apple-system, system-ui, sans-serif; }
</style>
</head>
<body>
  <div id="waiting">OUTANGUTAN OUTPUT — waiting…</div>
  <video id="v" playsinline></video>
  <div id="identify">
    <div id="bars">
      <div style="background:#c0c0c0"></div><div style="background:#c0c000"></div>
      <div style="background:#00c0c0"></div><div style="background:#00c000"></div>
      <div style="background:#c000c0"></div><div style="background:#c00000"></div>
      <div style="background:#0000c0"></div>
    </div>
    <div id="idlabel">Output</div>
  </div>

<script>
(function () {
  'use strict';
  const DB_NAME = 'outangutan', DB_VER = 1, STORE = 'media';
  const v = document.getElementById('v');
  const idEl = document.getElementById('identify');
  const idLabel = document.getElementById('idlabel');
  const waiting = document.getElementById('waiting');
  const bc = ('BroadcastChannel' in self) ? new BroadcastChannel('outangutan-output') : null;
  let curUrl = null, curMediaId = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = () => { try { r.result.createObjectStore(STORE); } catch (e) {} };
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }
  async function getBlob(id) {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readonly').objectStore(STORE).get(id);
      tx.onsuccess = () => resolve(tx.result && tx.result.blob ? tx.result.blob : null);
      tx.onerror = () => resolve(null);
    });
  }
  function revoke() { if (curUrl) { try { URL.revokeObjectURL(curUrl); } catch (e) {} curUrl = null; } }

  async function load(mediaId) {
    if (mediaId === curMediaId) return;
    const blob = await getBlob(mediaId);
    revoke();
    curMediaId = mediaId;
    if (!blob) { v.removeAttribute('src'); v.load(); return; }
    curUrl = URL.createObjectURL(blob);
    v.src = curUrl; v.load();
    waiting.style.display = 'none';
  }

  function fadeVolume(to, ms) {
    const from = v.volume, t0 = performance.now(), dur = Math.max(1, ms || 0);
    (function step(t) {
      const k = Math.min(1, (t - t0) / dur);
      v.volume = Math.max(0, Math.min(1, from + (to - from) * k));
      if (k < 1) requestAnimationFrame(step); else if (to === 0) { try { v.pause(); } catch (e) {} }
    })(t0);
  }

  async function handle(m) {
    switch (m && m.t) {
      case 'ping': reply({ t: 'pong' }); break;
      case 'load': await load(m.mediaId); if (typeof m.volume === 'number') v.volume = m.volume; break;
      case 'play':
        if (m.mediaId) await load(m.mediaId);
        if (typeof m.at === 'number') { try { v.currentTime = m.at; } catch (e) {} }
        v.loop = !!m.loop; v.volume = (typeof m.volume === 'number') ? m.volume : v.volume;
        try { await v.play(); } catch (e) {}
        break;
      case 'pause': try { v.pause(); } catch (e) {} break;
      case 'resume': try { await v.play(); } catch (e) {} break;
      case 'seek': try { v.currentTime = m.at; } catch (e) {} break;
      case 'volume': v.volume = Math.max(0, Math.min(1, m.v)); break;
      case 'fade': fadeVolume(m.to, m.ms); if (m.to > 0) { try { await v.play(); } catch (e) {} } break;
      case 'stop': try { v.pause(); } catch (e) {} v.removeAttribute('src'); v.load(); revoke(); curMediaId = null; waiting.style.display = 'grid'; break;
      case 'identify': idEl.classList.toggle('on', !!m.on); idLabel.textContent = m.label || 'Output'; break;
      case 'holdLast': /* leave last frame painted: just pause, keep src */ try { v.pause(); } catch (e) {} break;
    }
  }
  function reply(msg) { if (bc) bc.postMessage(Object.assign({ _from: 'output' }, msg)); if (window.opener) try { window.opener.postMessage(Object.assign({ _og: true }, msg), '*'); } catch (e) {} }

  if (bc) bc.onmessage = (e) => { if (e.data && e.data._from !== 'output') handle(e.data); };
  window.addEventListener('message', (e) => { if (e.data && e.data._og && e.data._from !== 'output') handle(e.data); });

  // let the program element report ended/time back to the controller
  v.addEventListener('ended', () => reply({ t: 'ended', mediaId: curMediaId }));
  // announce readiness so the controller can (re)send the current cue
  reply({ t: 'ready' });
  window.addEventListener('beforeunload', () => reply({ t: 'closed' }));
})();
</script>
</body>
</html>
