<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Outrangutan Output</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐨</text></svg>">
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; cursor: none; }
  .deck { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: transparent; opacity: 0; }
  .deck.front { z-index: 2; }
  /* identify pattern: SMPTE-ish bars + label, shown pre-show */
  #identify { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 5; }
  #identify.on { display: flex; }
  #bars { flex: 1; display: flex; }
  #bars > div { flex: 1; }
  #idlabel { position: absolute; inset: 0; display: grid; place-items: center; font: 800 8vw -apple-system, system-ui, sans-serif; color: #fff; text-shadow: 0 2px 18px rgba(0,0,0,.8); letter-spacing: .04em; }
  #waiting { position: absolute; inset: 0; display: grid; place-items: center; color: #2a2a2a; font: 700 3vw -apple-system, system-ui, sans-serif; z-index: 1; }
  #keycv { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 3; display: none; }
  #keycv.on { display: block; }
</style>
</head>
<body>
  <div id="waiting">OUTRANGUTAN OUTPUT — waiting…</div>
  <video id="va" class="deck front" playsinline></video>
  <video id="vb" class="deck" playsinline></video>
  <canvas id="keycv"></canvas>
  <div id="identify">
    <div id="bars">
      <div style="background:#c0c0c0"></div><div style="background:#c0c000"></div>
      <div style="background:#00c0c0"></div><div style="background:#00c000"></div>
      <div style="background:#c000c0"></div><div style="background:#c00000"></div>
      <div style="background:#0000c0"></div>
    </div>
    <div id="idlabel">Output</div>
  </div>

<script>
(function () {
  'use strict';
  const DB_NAME = 'outrangutan', DB_VER = 1, STORE = 'media';
  const idEl = document.getElementById('identify');
  const idLabel = document.getElementById('idlabel');
  const waiting = document.getElementById('waiting');
  const bc = ('BroadcastChannel' in self) ? new BroadcastChannel('outrangutan-output') : null;
  // this output's id (controller addresses messages with `target`; null = broadcast)
  const MY_ID = (parseInt((location.hash.match(/out=(\d+)/) || [])[1], 10) || 1);
  document.title = 'Outrangutan Output ' + MY_ID;

  // two decks for crossfades
  const decks = { a: deck('va'), b: deck('vb') };
  let front = decks.a;
  // muted by default — the controller carries program audio; per-output audio is opt-in (setSinkId)
  function deck(id) { const el = document.getElementById(id); el.muted = true; return { el: el, url: null, mediaId: null }; }
  function other(d) { return d === decks.a ? decks.b : decks.a; }

  const fades = {};
  function curveK(k, c) { k = Math.max(0, Math.min(1, k)); if (c === 's') return k * k * (3 - 2 * k); if (c === 'log') return Math.pow(k, 2.2); return k; }
  function runFade(token, apply, from, to, ms, curve, done) {
    if (fades[token]) cancelAnimationFrame(fades[token]);
    if (!(ms > 0)) { apply(to); if (done) done(); return; }
    const t0 = performance.now();
    const tick = (t) => {
      const k = (t - t0) / ms;
      if (k >= 1) { apply(to); delete fades[token]; if (done) done(); return; }
      apply(from + (to - from) * curveK(k, curve)); fades[token] = requestAnimationFrame(tick);
    };
    fades[token] = requestAnimationFrame(tick);
  }

  function openDB() {
    return new Promise((resolve, reject) => {
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = () => { try { r.result.createObjectStore(STORE); } catch (e) {} };
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }
  async function getBlob(id) {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readonly').objectStore(STORE).get(id);
      tx.onsuccess = () => resolve(tx.result && tx.result.blob ? tx.result.blob : null);
      tx.onerror = () => resolve(null);
    });
  }
  function revoke(d) { if (d.url) { try { URL.revokeObjectURL(d.url); } catch (e) {} d.url = null; } }

  async function loadInto(d, mediaId, at, loop, fit) {
    const blob = await getBlob(mediaId);
    revoke(d); d.mediaId = mediaId;
    if (!blob) { d.el.removeAttribute('src'); d.el.load(); return false; }
    d.url = URL.createObjectURL(blob);
    d.el.src = d.url; d.el.loop = !!loop; d.el.style.objectFit = fit || 'contain'; d.el.load();
    if (typeof at === 'number') { try { d.el.currentTime = at; } catch (e) {} }
    waiting.style.display = 'none';
    return true;
  }
  function bringFront(d) { decks.a.el.classList.toggle('front', d === decks.a); decks.b.el.classList.toggle('front', d === decks.b); front = d; }
  function stopDeck(d) { try { d.el.pause(); } catch (e) {} d.el.removeAttribute('src'); d.el.load(); revoke(d); d.mediaId = null; d.el.style.opacity = 0; }

  // ── keyer (Phase 5: chroma/luma/alpha key, mirrored from the controller) ──
  const keycv = document.getElementById('keycv');
  let keyer = null, keyState = { mode: 'off' }, keyRAF = null;
  const KEY_VERT = 'attribute vec2 p; varying vec2 v_uv; void main(){ v_uv = vec2((p.x+1.0)/2.0, 1.0-(p.y+1.0)/2.0); gl_Position = vec4(p,0.0,1.0); }';
  const KEY_FRAG = [
    'precision mediump float;',
    'uniform sampler2D u_tex; uniform int u_mode; uniform vec3 u_key;',
    'uniform float u_sim; uniform float u_smooth; uniform vec3 u_bg; varying vec2 v_uv;',
    'void main(){ vec4 c = texture2D(u_tex, v_uv); float a = c.a;',
    '  if(u_mode==1){ a = smoothstep(u_sim, u_sim+u_smooth+0.001, distance(c.rgb, u_key)); }',
    '  else if(u_mode==2){ a = smoothstep(u_sim, u_sim+u_smooth+0.001, dot(c.rgb, vec3(0.299,0.587,0.114))); }',
    '  else if(u_mode==3){ a = c.a; }',
    '  gl_FragColor = vec4(mix(u_bg, c.rgb, a), 1.0); }'
  ].join('\n');
  function hexRGB(h) { h = (h || '').replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join(''); const n = parseInt(h || '000000', 16); return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255]; }
  function makeKeyer(canvas) {
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl'); if (!gl) return null;
    const sh = (t, s) => { const o = gl.createShader(t); gl.shaderSource(o, s); gl.compileShader(o); return gl.getShaderParameter(o, gl.COMPILE_STATUS) ? o : null; };
    const vs = sh(gl.VERTEX_SHADER, KEY_VERT), fs = sh(gl.FRAGMENT_SHADER, KEY_FRAG); if (!vs || !fs) return null;
    const prog = gl.createProgram(); gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return null;
    gl.useProgram(prog);
    const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'p'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    const tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    const U = { mode: gl.getUniformLocation(prog, 'u_mode'), key: gl.getUniformLocation(prog, 'u_key'), sim: gl.getUniformLocation(prog, 'u_sim'), smooth: gl.getUniformLocation(prog, 'u_smooth'), bg: gl.getUniformLocation(prog, 'u_bg') };
    const MODES = { off: 0, chroma: 1, luma: 2, alpha: 3 };
    return { render(video, p) {
      if (!video || !video.videoWidth) return;
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
      gl.viewport(0, 0, canvas.width, canvas.height);
      try { gl.bindTexture(gl.TEXTURE_2D, tex); gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video); } catch (e) { return; }
      gl.uniform1i(U.mode, MODES[p.mode] || 0);
      const k = hexRGB(p.color || '#00b140'); gl.uniform3f(U.key, k[0], k[1], k[2]);
      gl.uniform1f(U.sim, p.sim == null ? 0.3 : p.sim); gl.uniform1f(U.smooth, p.smooth == null ? 0.1 : p.smooth);
      const bg = hexRGB(p.bg || '#000000'); gl.uniform3f(U.bg, bg[0], bg[1], bg[2]);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    } };
  }
  function applyKey(m) {
    keyState = (m && m.key) || { mode: 'off' };
    if (keyState.mode && keyState.mode !== 'off') {
      if (!keyer) keyer = makeKeyer(keycv);
      if (!keyer) return;
      keycv.classList.add('on');
      if (!keyRAF) { const loop = () => { if (front && front.el && front.el.videoWidth) keyer.render(front.el, keyState); keyRAF = requestAnimationFrame(loop); }; keyRAF = requestAnimationFrame(loop); }
    } else { keyOff(); }
  }
  function keyOff() { keycv.classList.remove('on'); if (keyRAF) { cancelAnimationFrame(keyRAF); keyRAF = null; } }

  async function doPlay(m) {
    const d = other(front);
    const ok = await loadInto(d, m.mediaId, m.at, m.loop, m.fit);
    if (!ok) return;
    if (typeof m.at === 'number') { try { d.el.currentTime = m.at; } catch (e) {} }
    d.el.volume = (m.fadeIn > 0) ? 0 : (typeof m.volume === 'number' ? m.volume : 1);
    bringFront(d);
    try { await d.el.play(); } catch (e) {}
    const prev = other(d);
    if (m.fadeIn > 0) { d.el.style.opacity = 0; runFade('in', v => { d.el.style.opacity = v; d.el.volume = v * (m.volume == null ? 1 : m.volume); }, 0, 1, m.fadeIn, m.curve, () => stopDeck(prev)); }
    else { d.el.style.opacity = 1; stopDeck(prev); }
  }
  async function doXfade(m) {
    const d = other(front), prev = front;
    const ok = await loadInto(d, m.mediaId, m.at, m.loop, m.fit);
    if (!ok) return doPlay(m);
    if (typeof m.at === 'number') { try { d.el.currentTime = m.at; } catch (e) {} }
    d.el.volume = 0; d.el.style.opacity = 0;
    bringFront(d);
    try { await d.el.play(); } catch (e) {}
    const vol = (m.volume == null ? 1 : m.volume);
    runFade('in', v => { d.el.style.opacity = v; d.el.volume = v * vol; }, 0, 1, m.ms, m.curve);
    runFade('out', v => { prev.el.volume = v * (prev.el.volume || vol); }, 1, 0, m.ms, m.curve, () => stopDeck(prev));
  }

  async function handle(m) {
    switch (m && m.t) {
      case 'ping': reply({ t: 'pong' }); break;
      case 'play': await doPlay(m); break;
      case 'xfade': await doXfade(m); break;
      case 'pause': try { front.el.pause(); } catch (e) {} break;
      case 'resume': try { await front.el.play(); } catch (e) {} break;
      case 'seek': try { front.el.currentTime = m.at; } catch (e) {} break;
      case 'volume': front.el.volume = Math.max(0, Math.min(1, m.v)); break;
      case 'fit': front.el.style.objectFit = m.fit || 'contain'; break;
      case 'fade': { const v0 = front.el.volume || 1, to = m.to || 0; runFade('master', v => { front.el.style.opacity = v; front.el.volume = v0 * v; }, 1, to, m.ms, m.curve, () => { if (to === 0) { stopDeck(decks.a); stopDeck(decks.b); waiting.style.display = 'grid'; } }); break; }
      case 'black': { const v0 = front.el.volume || 1; runFade('master', v => { front.el.style.opacity = v; front.el.volume = v0 * v; }, 1, 0, m.ms || 0, m.curve, () => { stopDeck(front); }); break; }
      case 'stop': stopDeck(decks.a); stopDeck(decks.b); keyOff(); waiting.style.display = 'grid'; break;
      case 'holdLast': try { front.el.pause(); } catch (e) {} break;
      case 'identify': idEl.classList.toggle('on', !!m.on); idLabel.textContent = m.label || ('Output ' + MY_ID); break;
      case 'audio': await applyAudio(m); break;   // per-output device routing (setSinkId)
      case 'key': applyKey(m); break;             // chroma/luma/alpha key mirrored from controller
    }
  }
  async function applyAudio(m) {
    const on = !!m.on;
    for (const d of [decks.a, decks.b]) {
      d.el.muted = !on;
      if (on && m.sinkId && d.el.setSinkId) { try { await d.el.setSinkId(m.sinkId); } catch (e) {} }
    }
  }
  function reply(msg) { const out = Object.assign({ _from: 'output', id: MY_ID }, msg); if (bc) bc.postMessage(out); if (window.opener) try { window.opener.postMessage(Object.assign({ _og: true }, out), '*'); } catch (e) {} }

  // act only on broadcast (target null) or messages addressed to this output
  function forMe(d) { return d && d._from !== 'output' && (d.target == null || d.target === MY_ID); }
  if (bc) bc.onmessage = (e) => { if (forMe(e.data)) handle(e.data); };
  window.addEventListener('message', (e) => { if (e.data && e.data._og && forMe(e.data)) handle(e.data); });

  decks.a.el.addEventListener('ended', () => { if (front === decks.a) reply({ t: 'ended', mediaId: decks.a.mediaId }); });
  decks.b.el.addEventListener('ended', () => { if (front === decks.b) reply({ t: 'ended', mediaId: decks.b.mediaId }); });
  reply({ t: 'ready' });
  window.addEventListener('beforeunload', () => reply({ t: 'closed' }));
})();
</script>
</body>
</html>
